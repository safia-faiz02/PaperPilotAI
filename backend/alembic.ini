# Alembic's main config file. Most of this is boilerplate you'll rarely
# touch — the one setting that matters, script_location, just tells
# Alembic "look in the ./alembic folder for migration scripts."
# Note: we deliberately leave sqlalchemy.url blank here — alembic/env.py
# fills it in dynamically from our .env file instead, so we never have
# to hardcode (or accidentally commit) a database password in this file.

[alembic]
script_location = alembic

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
